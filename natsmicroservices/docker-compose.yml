services:
  api-gateway:
    build: ./http-api-gateway
    ports:
      - "3000:3000"
    volumes:
      - ./http-api-gateway/src:/usr/src/app/src
    command: npm run start:dev
    environment:
      - PORT=3000
    depends_on:
      - nats
      - ai-microservice

  users-microservice:
    build: ./users-microservice
    volumes:
      - ./users-microservice/src:/usr/src/app/src
    command: npm run start:dev
    depends_on:
      - nats

  payments-microservice:
    build: ./payments-microservice
    volumes:
      - ./payments-microservice/src:/usr/src/app/src
    command: npm run start:dev
    depends_on:
      - nats

  ai-microservice:
    build: ./ai-microservice
    volumes:
      - ./ai-microservice/src:/usr/src/app/src
    command: npm run start:dev
    depends_on:
      - nats
      - ollama

  nats:
    image: nats
    ports:
      - 4222:4222

  ollama:
    image: ollama/ollama
    ports:
      - 11434:11434
    volumes:
      - ./ollama_data:/root/.ollama
